<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Air Hockey 2P</title>
    <style>
        body { margin: 0; background: #1a1a1a; overflow: hidden; touch-action: none; }
        canvas { display: block; margin: 0 auto; background: #000; border: 2px solid #444; }
    </style>
</head>
<body>
<canvas id="game"></canvas>
<script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');

    // Настройки из вашего плана (переводим см в пиксели примерно)
    const paddleW = 80; // Доска ~2 см
    const paddleH = 15;
    const goalW = 190;  // Ворота ~5 см
    
    let ball = { x: 0, y: 0, dx: 4, dy: 4, radius: 10 };
    let p1 = { x: 0, y: 20, score: 0 }; // Верхний
    let p2 = { x: 0, y: 0, score: 0 };  // Нижний

    function init() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        p2.y = canvas.height - 35;
        p1.x = p2.x = canvas.width / 2 - paddleW / 2;
        resetBall();
    }

    function resetBall() {
        ball.x = canvas.width / 2;
        ball.y = canvas.height / 2;
        ball.dx = (Math.random() > 0.5 ? 4 : -4);
        ball.dy = (Math.random() > 0.5 ? 4 : -4);
    }

    // Сенсорное управление
    window.addEventListener('touchstart', handleTouch);
    window.addEventListener('touchmove', handleTouch);

    function handleTouch(e) {
        for (let t of e.touches) {
            if (t.clientY < canvas.height / 2) {
                p1.x = t.clientX - paddleW / 2;
            } else {
                p2.x = t.clientX - paddleW / 2;
            }
        }
        e.preventDefault();
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Рисуем ворота (серые линии)
        ctx.strokeStyle = "#555";
        ctx.lineWidth = 5;
        const goalStart = (canvas.width - goalW) / 2;
        ctx.strokeRect(goalStart, 0, goalW, 5); // Верхние
        ctx.strokeRect(goalStart, canvas.height - 5, goalW, 5); // Нижние

        // Доски
        ctx.fillStyle = "#00ffcc";
        ctx.fillRect(p1.x, p1.y, paddleW, paddleH);
        ctx.fillStyle = "#ff0066";
        ctx.fillRect(p2.x, p2.y, paddleW, paddleH);

        // Мяч
        ctx.beginPath();
        ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI*2);
        ctx.fillStyle = "#fff";
        ctx.fill();
        ctx.closePath();

        // Логика движения
        ball.x += ball.dx;
        ball.y += ball.dy;

        // Отскок от стен
        if (ball.x < 0 || ball.x > canvas.width) ball.dx *= -1;

        // Отскок от досок
        if (ball.y < p1.y + paddleH && ball.x > p1.x && ball.x < p1.x + paddleW) ball.dy *= -1.1;
        if (ball.y > p2.y - ball.radius && ball.x > p2.x && ball.x < p2.x + paddleW) ball.dy *= -1.1;

        // Проверка гола
        if (ball.y < 0) {
            if (ball.x > goalStart && ball.x < goalStart + goalW) { p2.score++; resetBall(); }
            else ball.dy *= -1;
        }
        if (ball.y > canvas.height) {
            if (ball.x > goalStart && ball.x < goalStart + goalW) { p1.score++; resetBall(); }
            else ball.dy *= -1;
        }

        requestAnimationFrame(draw);
    }

    init();
    draw();
</script>
</body>
</html>
