<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hockey Pro</title>
    <style>
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; touch-action: none; font-family: sans-serif; }
        #game { position: absolute; top: 0; left: 0; z-index: 5; }
        #menu {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 80%; max-width: 300px; padding: 20px; background: #111; border: 4px solid #f06; border-radius: 15px; text-align: center; z-index: 100;
        }
        button { width: 100%; padding: 20px; margin: 10px 0; font-size: 18px; font-weight: bold; background: #0ff; border: none; border-radius: 10px; }
        #serve-msg { position: absolute; top: 45%; width: 100%; text-align: center; font-size: 24px; color: #0ff; z-index: 80; pointer-events: none; display: none; font-weight: bold; }
    </style>
</head>
<body>

<div id="menu">
    <h1 style="color:#f06">HOCKEY 10x</h1>
    <button id="btn1">ОДИН ИГРОК</button>
    <button id="btn2">ДВА ИГРОКА</button>
</div>

<div id="serve-msg">ТАПНИ ДЛЯ ПОДАЧИ!</div>
<canvas id="game"></canvas>

<script>
window.onload = function() {
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const menu = document.getElementById('menu');
    const serveMsg = document.getElementById('serve-msg');

    let audioCtx;
    function playSound(freq, type, dur) {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        g.gain.setValueAtTime(0.1, audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + dur);
        osc.connect(g); g.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + dur);
    }

    let gameMode = 1, isRunning = false, isWaiting = false, serving = 2;
    let p1Score = 0, p2Score = 0;
    const baseW = 90, paddleH = 15, ballRadius = 10, speed = 10;

    let ball = { x: 0, y: 0, dx: 0, dy: 0 };
    let p1 = { x: 0, y: 40, w: baseW }; 
    let p2 = { x: 0, y: 0, w: baseW };

    function initSize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        p2.y = canvas.height - 60;
        p1.x = p2.x = canvas.width / 2 - baseW / 2;
    }

    initSize();
    window.addEventListener('resize', initSize);

    document.getElementById('btn1').onclick = () => start(1);
    document.getElementById('btn2').onclick = () => start(2);

    function start(mode) {
        gameMode = mode;
        menu.style.display = 'none';
        isRunning = true;
        p1Score = 0; p2Score = 0;
        prepare();
        loop();
    }

    function prepare() {
        isWaiting = true;
        serveMsg.style.display = 'block';
        // Уменьшаем ползунок, если очков >= 6
        p1.w = (p1Score >= 6) ? baseW / 2 : baseW;
        p2.w = (p2Score >= 6) ? baseW / 2 : baseW;
        
        ball.x = canvas.width / 2;
        ball.y = (serving === 1) ? p1.y + paddleH + 20 : p2.y - 20;
        ball.dx = 0; ball.dy = 0;
        if (gameMode === 1 && serving === 1) setTimeout(launch, 1000);
    }

    function launch() {
        if (!isWaiting) return;
        isWaiting = false;
        serveMsg.style.display = 'none';
        playSound(800, 'sine', 0.2);
        ball.dx = (Math.random() > 0.5 ? 1 : -1) * speed;
        ball.dy = (serving === 1 ? 1 : -1) * speed;
    }

    window.addEventListener('touchstart', () => { if (isWaiting && (gameMode === 2 || serving === 2)) launch(); });

    window.addEventListener('touchmove', (e) => {
        for (let t of e.touches) {
            if (t.clientY < canvas.height/2 && gameMode === 2) p1.x = t.clientX - p1.w/2;
            if (t.clientY > canvas.height/2) p2.x = t.clientX - p2.w/2;
        }
    });

    function loop() {
        if (!isRunning) return;
        ctx.fillStyle = "#000"; ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        // Счет и Линии
        ctx.strokeStyle = "#222"; ctx.strokeRect(5, 5, canvas.width-10, canvas.height-10);
        ctx.fillStyle = "rgba(255,255,255,0.15)"; ctx.font = "bold 70px Arial"; ctx.textAlign = "center";
        ctx.fillText(p1Score, canvas.width/2, canvas.height/2 - 50);
        ctx.fillText(p2Score, canvas.width/2, canvas.height/2 + 100);

        // Покраска ползунков (лидер - желтый)
        ctx.fillStyle = (p1Score >= 6) ? "#ff0" : "#0ff"; ctx.fillRect(p1.x, p1.y, p1.w, paddleH);
        ctx.fillStyle = (p2Score >= 6) ? "#ff0" : "#f06"; ctx.fillRect(p2.x, p2.y, p2.w, paddleH);
        
        ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.arc(ball.x, ball.y, ballRadius, 0, Math.PI*2); ctx.fill();

        if (!isWaiting) {
            if (gameMode === 1) p1.x += (ball.x - p1.w/2 - p1.x) * 0.15;
            ball.x += ball.dx; ball.y += ball.dy;

            if (ball.x < ballRadius || ball.x > canvas.width - ballRadius) { ball.dx *= -1; playSound(400, 'square', 0.05); }

            if (ball.y < p1.y + paddleH + ballRadius && ball.y > p1.y && ball.x > p1.x && ball.x < p1.x + p1.w) { 
                ball.dy = speed; ball.y = p1.y+paddleH+ballRadius; playSound(600, 'sine', 0.1); 
            }
            if (ball.y > p2.y - ballRadius && ball.y < p2.y + paddleH && ball.x > p2.x && ball.x < p2.x + p2.w) { 
                ball.dy = -speed; ball.y = p2.y-ballRadius; playSound(600, 'sine', 0.1); 
            }

            if (ball.y < 0) { p2Score++; serving = 1; playSound(200, 'sawtooth', 0.3); finish(); }
            if (ball.y > canvas.height) { p1Score++; serving = 2; playSound(200, 'sawtooth', 0.3); finish(); }
        }
        requestAnimationFrame(loop);
    }

    function finish() {
        if (p1Score >= 8 || p2Score >= 8) {
            alert(p1Score >= 8 ? "ВЕРХНИЙ ВЫИГРАЛ!" : "НИЖНИЙ ВЫИГРАЛ!");
            location.reload();
        } else prepare();
    }
};
</script>
</body>
</html>
