<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Air Hockey - 8 Points</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; touch-action: none; }
        canvas { display: block; }
        #menu {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            text-align: center; background: rgba(0,0,0,0.8); padding: 20px; border: 2px solid #0f0;
        }
        button { 
            padding: 15px 30px; font-size: 18px; margin: 10px; cursor: pointer;
            background: #222; color: #fff; border: 1px solid #fff;
        }
    </style>
</head>
<body>

<div id="menu">
    <h1>AIR HOCKEY</h1>
    <p>Игра до 8 очков</p>
    <button onclick="startGame(1)">1 Игрок (Против ИИ)</button><br>
    <button onclick="startGame(2)">2 Игрока</button>
</div>

<canvas id="game"></canvas>

<script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const menu = document.getElementById('menu');

    // Настройки звука (Web Audio API)
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playSound(freq, type) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.1);
    }

    // Параметры
    let gameMode = 1;
    let isRunning = false;
    const paddleW = 80;
    const paddleH = 15;
    const goalW = 190;
    
    let ball = { x: 0, y: 0, dx: 6, dy: 6, radius: 10 }; // Скорость увеличена
    let p1 = { x: 0, y: 30, score: 0 }; // Верх
    let p2 = { x: 0, y: 0, score: 0 };  // Низ

    function startGame(mode) {
        gameMode = mode;
        menu.style.display = 'none';
        isRunning = true;
        init();
        draw();
    }

    function init() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        p2.y = canvas.height - 45; // Подняли ползунок, чтобы был виден
        p1.x = p2.x = canvas.width / 2 - paddleW / 2;
        p1.score = 0;
        p2.score = 0;
        resetBall();
    }

    function resetBall() {
        ball.x = canvas.width / 2;
        ball.y = canvas.height / 2;
        ball.dx = (Math.random() > 0.5 ? 6 : -6);
        ball.dy = (Math.random() > 0.5 ? 6 : -6);
    }

    // Управление
    window.addEventListener('touchmove', (e) => {
        for (let t of e.touches) {
            if (gameMode === 2 && t.clientY < canvas.height / 2) {
                p1.x = t.clientX - paddleW / 2;
            } else if (t.clientY > canvas.height / 2) {
                p2.x = t.clientX - paddleW / 2;
            }
        }
    });

    function draw() {
        if (!isRunning) return;
        ctx.fillStyle = "#000";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Поле и ворота
        const goalStart = (canvas.width - goalW) / 2;
        ctx.strokeStyle = "#333";
        ctx.lineWidth = 10;
        ctx.strokeRect(goalStart, 0, goalW, 10);
        ctx.strokeRect(goalStart, canvas.height - 10, goalW, 10);

        // Счет
        ctx.fillStyle = "rgba(255,255,255,0.3)";
        ctx.font = "40px Arial";
        ctx.fillText(p1.score, 20, canvas.height/2 - 20);
        ctx.fillText(p2.score, 20, canvas.height/2 + 50);

        // Доски
        ctx.fillStyle = "#0ff"; ctx.fillRect(p1.x, p1.y, paddleW, paddleH);
        ctx.fillStyle = "#f06"; ctx.fillRect(p2.x, p2.y, paddleW, paddleH);

        // Мяч
        ctx.beginPath();
        ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI*2);
        ctx.fillStyle = "#fff";
        ctx.fill();

        // Логика ИИ для 1 игрока
        if (gameMode === 1) {
            let aiSpeed = 5.5;
            if (p1.x + paddleW/2 < ball.x) p1.x += aiSpeed;
            else p1.x -= aiSpeed;
        }

        // Физика
        ball.x += ball.dx;
        ball.y += ball.dy;

        if (ball.x < 0 || ball.x > canvas.width) { ball.dx *= -1; playSound(400, 'square'); }

        // Отскок от досок
        if (ball.y < p1.y + paddleH && ball.x > p1.x && ball.x < p1.x + paddleW) {
            ball.dy = Math.abs(ball.dy) * 1.05; playSound(600, 'sine');
        }
        if (ball.y > p2.y - ball.radius && ball.x > p2.x && ball.x < p2.x + paddleW) {
            ball.dy = -Math.abs(ball.dy) * 1.05; playSound(600, 'sine');
        }

        // Проверка гола
        if (ball.y < 0) {
            if (ball.x > goalStart && ball.x < goalStart + goalW) { 
                p2.score++; playSound(200, 'sawtooth'); resetBall(); 
            } else ball.dy *= -1;
        }
        if (ball.y > canvas.height) {
            if (ball.x > goalStart && ball.x < goalStart + goalW) { 
                p1.score++; playSound(200, 'sawtooth'); resetBall(); 
            } else ball.dy *= -1;
        }

        // Конец игры
        if (p1.score >= 8 || p2.score >= 8) {
            alert(p1.score >= 8 ? "Верхний игрок победил!" : "Нижний игрок победил!");
            isRunning = false;
            menu.style.display = 'block';
        } else {
            requestAnimationFrame(draw);
        }
    }
</script>
</body>
</html>
