<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fast Hockey - Full Goals</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; touch-action: none; }
        canvas { display: block; }
        #menu {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            text-align: center; background: rgba(0,0,0,0.9); padding: 30px; border: 3px solid #ff0066; border-radius: 15px;
        }
        button { 
            padding: 15px 30px; font-size: 20px; margin: 10px; cursor: pointer;
            background: #111; color: #fff; border: 2px solid #0ff; border-radius: 8px;
        }
    </style>
</head>
<body>

<div id="menu">
    <h1>SUPER FAST HOCKEY</h1>
    <p>Матч до 8 голов</p>
    <button onclick="startGame(1)">Один игрок</button><br>
    <button onclick="startGame(2)">Два игрока</button>
</div>

<canvas id="game"></canvas>

<script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const menu = document.getElementById('menu');

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playSound(freq, type, duration = 0.1) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + duration);
    }

    let gameMode = 1;
    let isRunning = false;
    const paddleW = 90; 
    const paddleH = 15;
    
    // Скорость увеличена в 2 раза (было 6, стало 12)
    let ball = { x: 0, y: 0, dx: 12, dy: 12, radius: 10 }; 
    let p1 = { x: 0, y: 35, score: 0 }; 
    let p2 = { x: 0, y: 0, score: 0 };  

    function startGame(mode) {
        gameMode = mode;
        menu.style.display = 'none';
        isRunning = true;
        if (audioCtx.state === 'suspended') audioCtx.resume();
        init();
        draw();
    }

    function init() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        p2.y = canvas.height - 50; 
        p1.x = p2.x = canvas.width / 2 - paddleW / 2;
        p1.score = 0;
        p2.score = 0;
        resetBall();
    }

    function resetBall() {
        ball.x = canvas.width / 2;
        ball.y = canvas.height / 2;
        // Случайное направление, но скорость всегда 12
        ball.dx = (Math.random() > 0.5 ? 12 : -12);
        ball.dy = (Math.random() > 0.5 ? 12 : -12);
    }

    window.addEventListener('touchmove', (e) => {
        for (let t of e.touches) {
            if (gameMode === 2 && t.clientY < canvas.height / 2) {
                p1.x = t.clientX - paddleW / 2;
            } else if (t.clientY > canvas.height / 2) {
                p2.x = t.clientX - paddleW / 2;
            }
        }
    }, { passive: false });

    function draw() {
        if (!isRunning) return;
        ctx.fillStyle = "#000";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Линия центра
        ctx.strokeStyle = "rgba(255,255,255,0.1)";
        ctx.setLineDash([10, 10]);
        ctx.beginPath();
        ctx.moveTo(0, canvas.height/2);
        ctx.lineTo(canvas.width, canvas.height/2);
        ctx.stroke();
        ctx.setLineDash([]);

        // Счет
        ctx.fillStyle = "rgba(255,255,255,0.2)";
        ctx.font = "bold 60px Arial";
        ctx.textAlign = "center";
        ctx.fillText(p1.score, canvas.width/2, canvas.height/2 - 50);
        ctx.fillText(p2.score, canvas.width/2, canvas.height/2 + 100);

        // Доски
        ctx.shadowBlur = 15;
        ctx.shadowColor = "#0ff";
        ctx.fillStyle = "#0ff"; ctx.fillRect(p1.x, p1.y, paddleW, paddleH);
        ctx.shadowColor = "#f06";
        ctx.fillStyle = "#f06"; ctx.fillRect(p2.x, p2.y, paddleW, paddleH);
        ctx.shadowBlur = 0;

        // Мяч
        ctx.beginPath();
        ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI*2);
        ctx.fillStyle = "#fff";
        ctx.fill();

        // Улучшенный ИИ для высокой скорости
        if (gameMode === 1) {
            let aiTarget = ball.x - paddleW / 2;
            p1.x += (aiTarget - p1.x) * 0.15; // Плавное, но быстрое слежение
        }

        // Движение
        ball.x += ball.dx;
        ball.y += ball.dy;

        // Отскок от боковых стен
        if (ball.x < ball.radius || ball.x > canvas.width - ball.radius) { 
            ball.dx *= -1; 
            playSound(400, 'square', 0.05); 
        }

        // Отскок от досок (верхняя)
        if (ball.y < p1.y + paddleH + ball.radius && ball.y > p1.y && ball.x > p1.x && ball.x < p1.x + paddleW) {
            ball.dy = Math.abs(ball.dy); 
            ball.y = p1.y + paddleH + ball.radius; // выталкивание мяча
            playSound(600, 'sine');
        }
        // Отскок от досок (нижняя)
        if (ball.y > p2.y - ball.radius && ball.y < p2.y + paddleH && ball.x > p2.x && ball.x < p2.x + paddleW) {
            ball.dy = -Math.abs(ball.dy); 
            ball.y = p2.y - ball.radius; // выталкивание мяча
            playSound(600, 'sine');
        }

        // Проверка ГОЛА (Ворота по всей длине)
        if (ball.y < 0) {
            p2.score++; 
            playSound(150, 'sawtooth', 0.3); 
            checkWin();
        } else if (ball.y > canvas.height) {
            p1.score++; 
            playSound(150, 'sawtooth', 0.3); 
            checkWin();
        }

        if (isRunning) requestAnimationFrame(draw);
    }

    function checkWin() {
        if (p1.score >= 8 || p2.score >= 8) {
            isRunning = false;
            setTimeout(() => {
                alert(p1.score >= 8 ? "ВЕРХНИЙ ВЫИГРАЛ!" : "НИЖНИЙ ВЫИГРАЛ!");
                menu.style.display = 'block';
            }, 100);
        } else {
            resetBall();
        }
    }
</script>
</body>
</html>
